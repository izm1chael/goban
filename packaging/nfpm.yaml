# nfpm package definition. One config builds both deb and rpm:
#   make package        # produces dist/goban_<ver>_amd64.deb and dist/goban-<ver>-1.x86_64.rpm
# Override version per release:
#   make package VERSION=1.2.3
#
# Hosting: attach the artifacts to GitHub Releases. No PPA/COPR repo yet.
name: goban
arch: ${ARCH}
platform: linux
version: ${VERSION}
version_schema: semver
section: net
priority: optional
maintainer: izm1chael <izm1chael@users.noreply.github.com>
description: |
  GoBan — fast fail2ban replacement.
  Watches log files, Docker container logs, and the systemd journal; bans
  offending IPs via direct netlink to the kernel ipset subsystem. Single
  static Go binary; ~10-30x less CPU than fail2ban under load.
vendor: izm1chael
homepage: https://github.com/izm1chael/goban
license: MIT

depends:
  - iptables
  - ipset

# These are the files the package ships. Paths on the right are install
# destinations on the user's system.
contents:
  - src: ../bin/goban-daemon
    dst: /usr/local/bin/goban-daemon
    file_info:
      mode: 0755
  - src: ../bin/goban-client
    dst: /usr/local/bin/goban-client
    file_info:
      mode: 0755
  - src: ../deploy/goban.service
    dst: /usr/lib/systemd/system/goban.service
    file_info:
      mode: 0644
  - src: ../examples/goban.yaml
    dst: /etc/goban/goban.yaml
    type: config|noreplace
    file_info:
      mode: 0644
  - src: ../examples/rules.d
    dst: /etc/goban/rules.d
    type: tree
  - src: ../README.md
    dst: /usr/share/doc/goban/README.md
    file_info:
      mode: 0644
  - src: ../deploy/goban-persist.service
    dst: /usr/lib/systemd/system/goban-persist.service
    file_info:
      mode: 0644
  - src: ../man/goban-daemon.8.gz
    dst: /usr/share/man/man8/goban-daemon.8.gz
    file_info:
      mode: 0644
  - src: ../man/goban-client.1.gz
    dst: /usr/share/man/man1/goban-client.1.gz
    file_info:
      mode: 0644

scripts:
  postinstall: ./postinst.sh
  postremove:  ./postrm.sh
