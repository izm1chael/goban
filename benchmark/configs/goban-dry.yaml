log_level: warn
log_file: /tmp/bench-goban.log
sock_path: /tmp/goban-bench.sock
dry_run: true
ipv6: false

allowlist:
  - 127.0.0.0/8

defaults:
  max_retries: 5
  findtime: 10m
  bantime: 1h

sources:
  - type: file
    name: auth
    path: /tmp/bench-auth.log

rules:
  - name: sshd
    source: auth
    regex: 'Failed password for (?:invalid user )?\S+ from (?P<ip>\S+) port'
    max_retries: 5
    findtime: 10m
    bantime: 1h
