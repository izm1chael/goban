# nginx rules. Source defaults to "nginx-access" pointing at the access log.
# Use nginx's default combined log format for these to match cleanly.
rules:
  # Drive-by PHP/ASP scanners hitting non-existent script files.
  - name: nginx-noscript
    source: nginx-access
    regex: '^(?P<ip>\S+) .* "(?:GET|POST|HEAD) [^"]*\.(?:php|asp|aspx|cgi|pl|exe)[^"]*" (?:404|403)'
    max_retries: 6
    findtime: 10m
    bantime: 6h

  # Aggressive 401/403 hammering against authenticated endpoints.
  - name: nginx-http-auth
    source: nginx-access
    regex: '^(?P<ip>\S+) .* "(?:GET|POST) [^"]*" 401'
    max_retries: 5
    findtime: 10m
    bantime: 6h

  # Known-bad User-Agent patterns (vulnerability scanners, web bots).
  - name: nginx-badbots
    source: nginx-access
    regex: '^(?P<ip>\S+) .* "[^"]+" \d+ \d+ "[^"]*" "(?:[Mm]asscan|[Nn]ikto|[Nn]map|sqlmap|wpscan|ZmEu|360Spider|MJ12bot|HTTrack|libwww-perl)"'
    max_retries: 1
    findtime: 1m
    bantime: 24h

  # Probes for common admin / wp-login endpoints from IPs that aren't supposed
  # to be hitting them.
  - name: nginx-probes
    source: nginx-access
    regex: '^(?P<ip>\S+) .* "(?:GET|POST) /(?:wp-login\.php|xmlrpc\.php|administrator/|phpmyadmin/|\.env|\.git/config|server-status)'
    max_retries: 3
    findtime: 10m
    bantime: 24h
