# Continuous integration: runs on every push to main and every PR.
# Three jobs run in parallel:
#   test    — go vet + race-tested unit tests
#   build   — verify both binaries compile (CGO-free AND journald variant)
#   docker  — verify the alpine image still builds (does NOT push)
#
# All three must be green before a branch can merge (configure branch
# protection in repo settings → Branches → main).
#
# Security note: this workflow does not use any untrusted github.event.*
# inputs in run: commands. The ref / branch name appears in actions/checkout
# which handles escaping internally.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race ./...

  build:
    name: build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: make build (CGO-free)
        run: make build
      - name: make build-journald (CGO + libsystemd)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libsystemd-dev
          make build-journald

  docker:
    name: docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: goban:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
